# Local/self-hosted alternative to Vercel. The database, storage and auth are
# hosted Supabase either way — set the Supabase/Resend variables in
# frontend/.env (see frontend/.env.example).
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    restart: always
